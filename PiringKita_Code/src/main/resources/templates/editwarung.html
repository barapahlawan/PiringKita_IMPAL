<body>
<a href="/history" class="back-btn">← Kembali</a>
<h2>Edit Warung</h2>

<form th:action="@{'/warung/update/' + ${warung.id}}" method="post" enctype="multipart/form-data">

    <!-- FOTO -->
    <label>Foto Restaurant</label>

    <div class="upload-container" id="previewBox">
        <img id="previewImage" 
             th:src="${warung.imageName != null ? '/uploads/' + warung.imageName : '/icons/camera.png'}"
             style="width: 100%; object-fit: cover; opacity: 0.9;">
    </div>

    <button type="button" onclick="document.getElementById('fileInput').click()" class="upload-btn">
        📷 Ganti Gambar
    </button>
    <input type="file" id="fileInput" name="image" accept="image/*">
    <div class="error-text" id="error-image">
    Foto wajib diunggah dan maksimal 5 MB
</div>
        <!-- NAMA WARUNG -->
    <label for="nama">Nama Warung</label>
    <div class="input-group">
        
        <input type="text" id="nama" name="nama" th:value="${warung.nama}" required>
        <div class="error-text" id="error-nama">Nama warung wajib diisi</div>
    </div>

    <!-- ALAMAT -->
    <label for="alamat">Alamat</label>
    <div class="input-group">
        
        <textarea id="alamat" name="alamat" rows="2" required
                  th:text="${warung.alamat}"></textarea>
                  <div class="error-text" id="error-alamat">Alamat wajib diisi</div>
    </div>

    <!-- TELEPON -->
    <label for="telepon">Nomor Telepon</label>
    <div class="input-group">
        
        <input type="text" id="telepon" name="telepon" th:value="${warung.telepon}">
        <div class="error-text" id="error-telepon">
    Nomor telepon wajib diisi dan hanya angka
</div>
    </div>


    <!-- DESKRIPSI -->
    <label for="deskripsi">Deskripsi</label>
    <div class="input-group">
        
        <textarea id="deskripsi" name="deskripsi" rows="3"
                  th:text="${warung.deskripsi}"></textarea>
                  <div class="error-text" id="error-deskripsi">
    Deskripsi minimal 10 karakter
</div>

    </div>

    <!-- TAG -->
    <label>Tag</label>
    <div class="tag-container" id="tagContainer">
        <input type="text" id="tagInput" placeholder="Tambah tag lalu tekan Enter">
        <div id="tagList">
            <!-- Tag awal dari DB -->
            <span class="tag" th:each="t : ${#strings.arraySplit(warung.tag, ',')}"
                  th:text="${t}">
            </span>
        </div>
        <input type="hidden" id="tagHidden" name="tag" th:value="${warung.tag}">
        <div class="error-text" id="error-tag">
    Minimal 1 tag harus ditambahkan
</div>
    </div>

    <!-- RATING -->
    <label>Rating</label>
    <div class="rating">
        <input type="radio" id="star5" name="rating" value="5" 
               th:checked="${warung.rating == 5}">
        <label for="star5">★</label>

        <input type="radio" id="star4" name="rating" value="4"
               th:checked="${warung.rating == 4}">
        <label for="star4">★</label>

        <input type="radio" id="star3" name="rating" value="3"
               th:checked="${warung.rating == 3}">
        <label for="star3">★</label>

        <input type="radio" id="star2" name="rating" value="2"
               th:checked="${warung.rating == 2}">
        <label for="star2">★</label>

        <input type="radio" id="star1" name="rating" value="1"
               th:checked="${warung.rating == 1}">
        <label for="star1">★</label>
        <div class="error-text" id="error-rating">Silakan pilih rating</div>
    </div>

    <!-- KOORDINAT -->
    <label>Koordinat Lokasi</label>
    <div class="input-group">
        <span class="icon">🌐</span>
        <input type="text" id="latitude" name="latitude" th:value="${warung.latitude}" readonly>
        <div class="error-text" id="error-lat">Lokasi belum dipilih</div>
    </div>

    <div class="input-group">
        <span class="icon">🧭</span>
        <input type="text" id="longitude" name="longitude" th:value="${warung.longitude}" readonly>
        <div class="error-text" id="error-lng">Lokasi belum dipilih</div>
    </div>

    <button type="button" class="loc-btn" onclick="openMapPopup()">
        📌 Pilih Lokasi di Map
    </button>

    

    <br><br>

    <button type="submit" class="save-btn">💾 Simpan Perubahan</button>

</form>


<!-- POPUP MAP -->
<div class="map-popup" id="mapPopup">
    <div class="map-popup-content">
        <div id="map" style="width: 100%; height: 320px;"></div>
        <button type="button" class="loc-btn" style="background: #007bff;" onclick="useCurrentLocation()">
        📍 Gunakan Lokasi Sekarang
    </button>
        <button onclick="closeMapPopup()" class="close-map-btn">Tutup</button>
    </div>
</div>


<!-- TOAST NOTIF -->
<div id="toast"></div>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
/* ================================
   PREVIEW GAMBAR SAAT DIPILIH
================================ */
document.getElementById("fileInput").addEventListener("change", function(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
        document.getElementById("previewImage").src = e.target.result;
    };
    reader.readAsDataURL(file);
});


/* ================================
   TAG SYSTEM
================================ */
const tagInput = document.getElementById("tagInput");
const tagList = document.getElementById("tagList");
const tagHidden = document.getElementById("tagHidden");

function refreshHiddenTag() {
    const tags = [...tagList.querySelectorAll(".tag")].map(t => t.textContent.trim());
    tagHidden.value = tags.join(",");
}

tagInput.addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        e.preventDefault();
        const val = tagInput.value.trim();
        if (val !== "") {
            const span = document.createElement("span");
            span.className = "tag";
            span.textContent = val;
            span.onclick = () => { span.remove(); refreshHiddenTag(); };
            tagList.appendChild(span);
            refreshHiddenTag();
            tagInput.value = "";
        }
    }
});

document.querySelectorAll("#tagList .tag").forEach(tag => {
    tag.onclick = () => { tag.remove(); refreshHiddenTag(); };
});
</script>
<script>
/* ================================
   MAP POPUP (LEAFLET)
================================ */
let map;
let marker;

function openMapPopup() {
    document.getElementById("mapPopup").style.display = "flex";

    setTimeout(() => {

        const lat = parseFloat(document.getElementById("latitude").value) || -6.200;
        const lng = parseFloat(document.getElementById("longitude").value) || 106.816;

        if (!map) {
            map = L.map("map").setView([lat, lng], 15);

            L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
                maxZoom: 19,
                attribution: "&copy; OpenStreetMap"
            }).addTo(map);

            map.on("click", function(e) {
                const lat = e.latlng.lat;
                const lng = e.latlng.lng;

                if (marker) marker.remove();
                marker = L.marker([lat, lng]).addTo(map);

                document.getElementById("latitude").value = lat;
                document.getElementById("longitude").value = lng;

                showToast("📌 Lokasi diperbarui!", "success");
            });

        } else {
            map.setView([lat, lng], 15);
        }

        // PENTING: INI HARUS DI SETELAH popup muncul
        setTimeout(() => map.invalidateSize(), 200);

    }, 50);
}


function closeMapPopup() {
    document.getElementById("mapPopup").style.display = "none";
}


/* ================================
   GPS — Lokasi Saat Ini
================================ */
function useCurrentLocation() {
    showToast("⏳ Mengambil lokasi...", "info");

    const btns = document.querySelectorAll(".loc-btn");
    btns.forEach(btn => btn.disabled = true);

    navigator.geolocation.getCurrentPosition(
        function (position) {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;

            document.getElementById("latitude").value = lat;
            document.getElementById("longitude").value = lng;

            if (map) {
                if (marker) marker.remove();
                marker = L.marker([lat, lng]).addTo(map);
                map.setView([lat, lng], 17);
            }

            showToast("📍 Lokasi berhasil ditemukan!", "success");
            resetButton();
        },

        function (error) {
            showToast("❌ Gagal mendapatkan lokasi! Izinkan akses GPS.", "error");
            console.error(error);
            resetButton();
        },

        {
            enableHighAccuracy: true,
            timeout: 15000,
            maximumAge: 0
        }
    );
}

function resetButton() {
    const btns = document.querySelectorAll(".loc-btn");
    btns.forEach(btn => btn.disabled = false);
}


/* ================================
   TOAST NOTIFICATION
================================ */
function showToast(message, type = "info") {
    const toast = document.getElementById("toast");
    toast.textContent = message;

    const colors = {
        success: "#28a745",
        error: "#dc3545",
        info: "#17a2b8"
    };

    toast.style.background = colors[type] || "#17a2b8";
    toast.className = "show";

    setTimeout(() => {
        toast.className = toast.className.replace("show", "");
    }, 3500);
}


document.querySelector("form").addEventListener("submit", function(e) {
    let valid = true;

    function showError(input, errorId) {
        document.getElementById(errorId).style.display = "block";
        if (input) input.classList.add("input-error");
        valid = false;
    }

    function clearError(input, errorId) {
        document.getElementById(errorId).style.display = "none";
        if (input) input.classList.remove("input-error");
    }

    /* =====================
       NAMA
    ===================== */
    const nama = document.getElementById("nama");
    nama.value.trim() === ""
        ? showError(nama, "error-nama")
        : clearError(nama, "error-nama");

    /* =====================
       ALAMAT
    ===================== */
    const alamat = document.getElementById("alamat");
    alamat.value.trim() === ""
        ? showError(alamat, "error-alamat")
        : clearError(alamat, "error-alamat");

    /* =====================
       TELEPON
    ===================== */
    const telepon = document.getElementById("telepon");
    const phoneRegex = /^[0-9]{10,15}$/;

    (!phoneRegex.test(telepon.value.trim()))
        ? showError(telepon, "error-telepon")
        : clearError(telepon, "error-telepon");

    /* =====================
       DESKRIPSI
    ===================== */
    const deskripsi = document.getElementById("deskripsi");
    deskripsi.value.trim().length < 10
        ? showError(deskripsi, "error-deskripsi")
        : clearError(deskripsi, "error-deskripsi");

    /* =====================
       TAG
    ===================== */
    const tagHidden = document.getElementById("tagHidden");
    tagHidden.value.trim() === ""
        ? showError(null, "error-tag")
        : clearError(null, "error-tag");

    /* =====================
       RATING
    ===================== */
    const ratingChecked = document.querySelector('input[name="rating"]:checked');
    ratingChecked
        ? document.getElementById("error-rating").style.display = "none"
        : (document.getElementById("error-rating").style.display = "block", valid = false);

    /* =====================
       KOORDINAT
    ===================== */
    const lat = document.getElementById("latitude");
    const lng = document.getElementById("longitude");

    lat.value === "" ? showError(lat, "error-lat") : clearError(lat, "error-lat");
    lng.value === "" ? showError(lng, "error-lng") : clearError(lng, "error-lng");

    /* =====================
       STOP SUBMIT
    ===================== */
    if (!valid) {
        e.preventDefault();
        showToast("❗ Lengkapi data yang masih salah / kosong", "error");
    }
});


document.querySelector("form").addEventListener("submit", function(e) {
    let valid = true;

    function showError(input, errorId) {
        document.getElementById(errorId).style.display = "block";
        if (input) input.classList.add("input-error");
        valid = false;
    }

    function clearError(input, errorId) {
        document.getElementById(errorId).style.display = "none";
        if (input) input.classList.remove("input-error");
    }

    /* =====================
       FOTO
    ===================== */
    const fileInput = document.getElementById("fileInput");
    const errorImage = document.getElementById("error-image");
    const previewImage = document.getElementById("previewImage");

    const hasOldImage = previewImage && !previewImage.src.includes("camera.png");

    if (!fileInput.files.length && !hasOldImage) {
        showError(fileInput, "error-image");
    } else if (fileInput.files.length) {
        const file = fileInput.files[0];
        const maxSize = 5 * 1024 * 1024; // 5MB

        if (file.size > maxSize) {
            showError(fileInput, "error-image");
        } else {
            clearError(fileInput, "error-image");
        }
    } else {
        clearError(fileInput, "error-image");
    }

    /* =====================
       (lanjutan validasi field lain)
    ===================== */

    if (!valid) {
        e.preventDefault();
        showToast("❗ Periksa kembali data, masih ada yang salah", "error");
    }
});


document.getElementById("fileInput").addEventListener("change", function () {
    const file = this.files[0];
    const errorImage = document.getElementById("error-image");

    if (!file) {
        errorImage.style.display = "block";
        errorImage.textContent = "Foto wajib diunggah";
        return;
    }

    if (file.size > 5 * 1024 * 1024) {
        errorImage.style.display = "block";
        errorImage.textContent = "Ukuran foto maksimal 5 MB";
        this.value = ""; // reset file
    } else {
        errorImage.style.display = "none";
    }
});


</script>
