<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lupa Password | PiringKita</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('/icons/Lupapassword.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .forgot-container {
            background: white;
            padding: 40px 35px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .forgot-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #25D366, #2ecc71);
        }

        .logo-container {
            margin-bottom: 25px;
        }

        .app-title {
            color: #25D366;
            font-size: 28px;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .title {
            font-size: 24px;
            font-weight: bold;
            color: #1a1a1a;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 14px;
            color: #666;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        /* Error Box dari Desain 1 */
        .error-box {
            background: #ffdddd;
            border-left: 4px solid #ff4444;
            padding: 12px 15px;
            margin-bottom: 20px;
            border-radius: 8px;
            color: #b30000;
            text-align: left;
            font-size: 14px;
        }

        .success-box {
            background: #ddffdd;
            border-left: 4px solid #44ff44;
            padding: 12px 15px;
            margin-bottom: 20px;
            border-radius: 8px;
            color: #006600;
            text-align: left;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e1e8ed;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s ease;
            background: #fafbfc;
        }

        .form-input:focus {
            outline: none;
            border-color: #25D366;
            background: white;
            box-shadow: 0 0 0 3px rgba(37, 211, 102, 0.1);
        }

        .form-input::placeholder {
            color: #aab8c2;
        }

        .submit-button {
            width: 100%;
            padding: 16px;
            background: #25D366;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
        }

        .submit-button:hover {
            background: #1ea952;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 211, 102, 0.4);
        }

        .back-link {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
            color: #666;
        }

        .back-link a {
            color: #25D366;
            text-decoration: none;
            font-weight: 500;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        .hint-text {
            color: #6c757d;
            font-size: 12px;
            margin-top: 5px;
            font-style: italic;
        }

        @media (max-width: 480px) {
            .forgot-container {
                padding: 30px 25px;
                margin: 10px;
            }
            
            .title {
                font-size: 22px;
            }
            
            .app-title {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="forgot-container">
        <div class="logo-container">
            <h1 class="app-title">PiringKita!</h1>
        </div>

        <h2 class="title">Lupa Password</h2>
        <p class="subtitle">Masukkan email Anda untuk mereset password</p>

        <!-- Error/Success Box dari Desain 1 -->
        <div th:if="${error}" class="error-box">
            <p th:text="${error}"></p>
        </div>
        <div th:if="${message}" class="success-box">
            <p th:text="${message}"></p>
        </div>

        <form th:action="@{/forgot-password}" method="post">
            <div class="form-group">
                <label for="email" class="form-label">Email</label>
                <input type="email" 
                       id="email" 
                       name="email" 
                       class="form-input" 
                       placeholder="email@domain.com"
                       required>
                <div class="hint-text">Masukkan email yang terdaftar di akun Anda</div>
            </div>

            <button type="submit" class="submit-button">Cari Akun</button>
        </form>

        <div class="back-link">
            <a th:href="@{/login}">← Kembali ke Login</a>
        </div>
    </div>

    <script>
        // Simple animation for form inputs
        document.addEventListener('DOMContentLoaded', function() {
            const inputs = document.querySelectorAll('.form-input');
            inputs.forEach(input => {
                input.addEventListener('focus', function() {
                    this.parentElement.style.transform = 'scale(1.02)';
                });
                
                input.addEventListener('blur', function() {
                    this.parentElement.style.transform = 'scale(1)';
                });
            });
        });
    </script>
</body>
</html>
